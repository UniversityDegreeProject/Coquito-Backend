<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña - Embutidos Coquito</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-img {
      max-width: 280px;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      margin-bottom: 20px;
      background: white;
      padding: 15px;
    }

    .logo h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .logo p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .password-requirements {
      margin-top: 10px;
      padding: 12px;
      background-color: #f8f9fa;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
    }

    .password-requirements ul {
      list-style: none;
      padding-left: 0;
    }

    .password-requirements li {
      padding: 3px 0;
      padding-left: 20px;
      position: relative;
    }

    .password-requirements li:before {
      content: "•";
      position: absolute;
      left: 5px;
      color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://i.ytimg.com/vi/DYDUIHhfBws/hq720.jpg" alt="Embutidos Coquito" class="logo-img">
      <p>Restablecer Contraseña</p>
    </div>

    <form method="POST" action="/api/auth/reset-password-submit" id="resetPasswordForm">
      <input type="hidden" name="token" value="{{TOKEN}}">
      
      <div class="form-group">
        <label for="newPassword">Nueva Contraseña</label>
        <input 
          type="password" 
          id="newPassword" 
          name="newPassword" 
          placeholder="Ingresa tu nueva contraseña"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          placeholder="Confirma tu nueva contraseña"
          required
        >
      </div>

      <div class="password-requirements">
        <strong>La contraseña debe contener:</strong>
        <ul>
          <li>Entre 6 y 16 caracteres</li>
          <li>Una letra mayúscula</li>
          <li>Una letra minúscula</li>
          <li>Un número</li>
          <li>Un caracter especial (@$!%*?&)</li>
        </ul>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        Cambiar Contraseña
      </button>

      <div class="message error" id="message" style="display: none;"></div>
    </form>
  </div>

  <script>
    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const submitBtn = document.getElementById('submitBtn');
      const messageDiv = document.getElementById('message');

      // Validar que las contraseñas coincidan
      if (newPassword !== confirmPassword) {
        messageDiv.textContent = 'Las contraseñas no coinciden';
        messageDiv.style.display = 'block';
        return;
      }

      // Validar formato de contraseña
      const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,16}$/;
      if (!passwordRegex.test(newPassword)) {
        messageDiv.textContent = 'La contraseña no cumple con los requisitos';
        messageDiv.style.display = 'block';
        return;
      }

      // Deshabilitar botón y enviar
      submitBtn.disabled = true;
      submitBtn.textContent = 'Cambiando contraseña...';
      this.submit();
    });
  </script>
</body>
</html>
